name: MHTML ذخیره صفحه به (نسخه جایگزین)

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the webpage to download'
        required: true
        type: string
      title:
        description: 'Optional title for the output file'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install single-file
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          npm install -g single-file-cli
      
      - name: Download page as MHTML
        run: |
          mkdir -p download
          if [ -z "${{ github.event.inputs.title }}" ]; then
            FILENAME="page_$(date +%Y%m%d_%H%M%S).mhtml"
          else
            FILENAME="${{ github.event.inputs.title }}.mhtml"
          fi
          
          single-file "${{ github.event.inputs.url }}" "download/${FILENAME}"
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download/
          git commit -m "Add MHTML for ${{ github.event.inputs.url }}" || echo "No changes"
          git push
