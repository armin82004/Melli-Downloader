name: دانلود سایت و Push به ریپو

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'آدرس کامل سایت'
        required: true
        type: string
        default: 'https://www.typescriptlang.org'

permissions:
  contents: write

jobs:
  mirror-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download complete website
        run: |
          SITE="${{ github.event.inputs.site_url }}"
          DOMAIN=$(echo "$SITE" | sed 's|https\?://||' | cut -d'/' -f1)
          
          echo "========================================="
          echo "شروع دانلود: $SITE"
          echo "========================================="
          
          # دانلود کامل سایت
          wget \
            --recursive \
            --level=inf \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --wait=2 \
            --random-wait \
            --limit-rate=500k \
            --no-clobber \
            --continue \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --execute robots=off \
            "$SITE" || true
          
          echo "✅ دانلود کامل شد"
          
          # پیدا کردن پوشه دانلود شده
          DOWNLOAD_DIR=$(find . -maxdepth 2 -type d \( -name "$DOMAIN" -o -name "www.$DOMAIN" -o -name "*.$DOMAIN" \) 2>/dev/null | head -1)
          
          if [ -z "$DOWNLOAD_DIR" ]; then
            DOWNLOAD_DIR=$(find . -maxdepth 1 -type d ! -name "." ! -name ".git" ! -name ".github" 2>/dev/null | head -1)
          fi
          
          echo "download_dir=$DOWNLOAD_DIR" >> $GITHUB_ENV
          echo "domain=$DOMAIN" >> $GITHUB_ENV

      - name: Show download statistics
        run: |
          if [ -d "${{ env.download_dir }}" ]; then
            FILE_COUNT=$(find "${{ env.download_dir }}" -type f | wc -l)
            TOTAL_SIZE=$(du -sh "${{ env.download_dir }}" | cut -f1)
            
            echo "========================================="
            echo "آمار دانلود"
            echo "========================================="
            echo "📁 پوشه: ${{ env.download_dir }}"
            echo "📄 تعداد فایل‌ها: $FILE_COUNT"
            echo "💾 حجم کل: $TOTAL_SIZE"
          fi

      - name: Create ZIP archives with 95MB parts
        run: |
          echo "========================================="
          echo "ساخت فایل ZIP با پارت‌های 95 مگابایتی"
          echo "========================================="
          
          DOWNLOAD_DIR="${{ env.download_dir }}"
          DOMAIN="${{ env.domain }}"
          
          if [ -z "$DOWNLOAD_DIR" ] || [ ! -d "$DOWNLOAD_DIR" ]; then
            echo "❌ پوشه دانلود یافت نشد!"
            exit 0
          fi
          
          # نصب zip
          sudo apt-get update
          sudo apt-get install -y zip
          
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          OUTPUT_NAME="website-mirror_${DOMAIN}_${TIMESTAMP}"
          
          # ساخت zip با پارت‌های 95 مگابایتی
          # -s 95m : تقسیم به پارت‌های 95 مگابایت
          # -r : recursive
          zip -r -s 95m "${OUTPUT_NAME}.zip" "$DOWNLOAD_DIR"
          
          echo "✅ فایل‌های ZIP ساخته شدند"
          ls -lh ${OUTPUT_NAME}.zip* 2>/dev/null
          
          echo "output_name=${OUTPUT_NAME}" >> $GITHUB_ENV

      - name: Move files to release folder
        run: |
          # ساخت پوشه برای فایل‌های آپلودی
          mkdir -p releases/${{ env.output_name }}
          
          # حرکت فایل‌های ZIP به پوشه releases
          mv ${{ env.output_name }}.zip* releases/${{ env.output_name }}/ 2>/dev/null || true
          
          # کپی یک فایل readme برای توضیح
          cat > releases/${{ env.output_name }}/README.md << 'EOF'
# آرشیو کامل سایت

این آرشیو شامل تمام فایل‌های سایت می‌باشد.

## نحوه استفاده:
1. تمام فایل‌های `*.zip` و `*.z01`، `*.z02` و ... را دانلود کنید
2. در یک پوشه قرار دهید
3. فایل `*.zip` را Extract کنید
4. فایل `index.html` را در مرورگر باز کنید

## تاریخ ایجاد:
$(date)
EOF

      - name: Commit and push to repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن فایل‌ها
          git add releases/
          
          # چک کردن تغییرات
          if git diff --cached --quiet; then
            echo "هیچ تغییر جدیدی برای push وجود ندارد"
          else
            git commit -m "Add website mirror for ${{ env.domain }} - $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
            echo "✅ فایل‌ها با موفقیت به ریپو push شدند"
          fi

      - name: Create tag for this version
        run: |
          TAG_NAME="mirror-${{ env.domain }}-$(date +%Y%m%d-%H%M%S)"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "✅ تگ ایجاد شد: $TAG_NAME"

      - name: Final report
        run: |
          echo ""
          echo "========================================="
          echo "            عملیات با موفقیت انجام شد"
          echo "========================================="
          echo ""
          echo "✅ فایل‌ها در مسیر زیر ذخیره شدند:"
          echo "   releases/${{ env.output_name }}/"
          echo ""
          echo "📁 برای مشاهده فایل‌ها به ریپوی گیت‌هاب مراجعه کنید"
          echo "🔗 https://github.com/${{ github.repository }}/tree/main/releases/${{ env.output_name }}"
          echo ""
          echo "🏷️ تگ ایجاد شده: mirror-${{ env.domain }}-$(date +%Y%m%d-%H%M%S)"
