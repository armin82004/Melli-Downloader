name: Download Only Subtitles

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      target_lang:
        description: 'Language code (en, fa, de, etc.)'
        required: true
        type: string
        default: 'en'

jobs:
  get-subtitles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YouTube Transcript API
        run: |
          pip install youtube-transcript-api

      - name: Download subtitle only
        run: |
          python3 << EOF
          from youtube_transcript_api import YouTubeTranscriptApi
          import json
          import re
          
          # استخراج Video ID از URL
          video_url = "${{ github.event.inputs.youtube_url }}"
          video_id = re.search(r'(?:v=|\/)([0-9A-Za-z_-]{11})', video_url).group(1)
          
          # دریافت زیرنویس
          ytt_api = YouTubeTranscriptApi()
          
          try:
              # تلاش برای زیرنویس دستی
              transcript = ytt_api.fetch(video_id, languages=['${{ github.event.inputs.target_lang }}'])
          except:
              # اگر نبود، سراغ زیرنویس خودکار می‌رود
              transcript_list = ytt_api.list(video_id)
              transcript = transcript_list.find_generated_transcript(['${{ github.event.inputs.target_lang }}'])
          
          # ذخیره زیرنویس به صورت JSON و SRT
          os.makedirs('output', exist_ok=True)
          
          # ذخیره به فرمت SRT
          with open('output/subtitle.srt', 'w', encoding='utf-8') as f:
              for i, snippet in enumerate(transcript, 1):
                  start = snippet['start']
                  end = start + snippet['duration']
                  text = snippet['text']
                  f.write(f"{i}\n")
                  f.write(f"{format_time(start)} --> {format_time(end)}\n")
                  f.write(f"{text}\n\n")
          
          # ذخیره به فرمت JSON
          with open('output/subtitle.json', 'w', encoding='utf-8') as f:
              json.dump(transcript, f, indent=2, ensure_ascii=False)
              
          print("✅ Subtitle downloaded successfully!")
          EOF
          
      - name: Commit and push subtitles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git commit -m "Add subtitle for ${{ github.event.inputs.youtube_url }}" || echo "No changes"
          git push
