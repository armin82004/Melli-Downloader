name: دانلودر پورن هاب

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL of the video'
        required: true
        type: string
      output_folder:
        description: 'Folder where the video will be saved'
        required: false
        type: string
        default: 'downloads'
      quality:
        description: 'Video quality (yt-dlp format selector)'
        required: true
        type: string
        default: 'bestvideo[height<=720]+bestaudio/best[ext=mp4]/best'
      archive_name:
        description: 'Base name for the RAR archive (if file is split)'
        required: false
        type: string
        default: 'video'

permissions:
  contents: write

jobs:
  download-and-maybe-split:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install yt-dlp and tools
        run: |
          pip install yt-dlp
          sudo apt-get update && sudo apt-get install -y bc rar openssl

      - name: Download video (retry up to 5 times)
        id: download
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          mkdir -p "$FOLDER"
          
          # Get list of files before download
          BEFORE_FILES=$(ls "$FOLDER" 2>/dev/null | md5sum)
          
          MAX_RETRIES=5
          RETRY_COUNT=0
          SUCCESS=false

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "Download attempt $((RETRY_COUNT+1))/$MAX_RETRIES"
            yt-dlp \
              --output "./$FOLDER/%(uploader)s - %(title)s - %(id)s.%(ext)s" \
              --format "${{ github.event.inputs.quality }}" \
              --merge-output-format mp4 \
              --retries 3 \
              --fragment-retries 10 \
              --no-check-certificate \
              --geo-bypass \
              --no-color \
              --ignore-errors \
              --newline \
              "${{ github.event.inputs.url }}" && {
                # Check for new files
                AFTER_FILES=$(ls "$FOLDER" 2>/dev/null | md5sum)
                if [ "$BEFORE_FILES" != "$AFTER_FILES" ]; then
                  # Find the newest file
                  NEW_FILE=$(ls -t "$FOLDER" | head -1)
                  if [ -n "$NEW_FILE" ] && [ -f "$FOLDER/$NEW_FILE" ]; then
                    echo "Download succeeded: $NEW_FILE"
                    SUCCESS=true
                    break
                  fi
                else
                  echo "Download command succeeded but no new file detected. Retrying..."
                fi
              } || {
                echo "Download attempt failed with exit code $?"
              }
            RETRY_COUNT=$((RETRY_COUNT+1))
            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Waiting 5 seconds before next attempt..."
              sleep 5
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo "Error: All $MAX_RETRIES download attempts failed."
            exit 1
          fi

          FILENAME="$NEW_FILE"
          SIZE_BYTES=$(stat -c %s "$FOLDER/$FILENAME")
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "Downloaded: $FILENAME (${SIZE_BYTES} bytes)"
        shell: bash

      - name: Conditional split (if file > 99 MB)
        id: split
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          SIZE_BYTES="${{ steps.download.outputs.size_bytes }}"
          
          # استفاده از bash pure برای محاسبه بدون bc
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          THRESHOLD_MB=99

          cd "$FOLDER"

          # مقایسه با استفاده از awk برای دقت بیشتر
          if echo "$SIZE_MB $THRESHOLD_MB" | awk '{if ($1 > $2) exit 0; else exit 1}'; then
            echo "File size ${SIZE_MB} MB exceeds ${THRESHOLD_MB} MB – splitting into 95 MB RAR parts."
            # استفاده از تاریخ و زمان به جای openssl
            RANDOM_SUFFIX=$(date +%s%N | md5sum | head -c 6)
            ARCHIVE_NAME="${{ github.event.inputs.archive_name }}_${RANDOM_SUFFIX}"
            echo "Archive base name: ${ARCHIVE_NAME}"
            rar a -v95m -m5 -ep1 "${ARCHIVE_NAME}.rar" "$FILENAME"
            rm "$FILENAME"
            echo "split_done=true" >> $GITHUB_OUTPUT
            echo "Split completed. Parts created:"
            ls -lh "${ARCHIVE_NAME}.part"*.rar 2>/dev/null || ls -lh "${ARCHIVE_NAME}.rar" 2>/dev/null
          else
            echo "File size ${SIZE_MB} MB is ≤${THRESHOLD_MB} MB – keeping original file (no RAR)."
            echo "split_done=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push to repository
        run: |
          FOLDER="${{ github.event.inputs.output_folder }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$FOLDER/"
          git diff --staged --quiet || git commit -m "Add downloaded video(s)"
          git push
