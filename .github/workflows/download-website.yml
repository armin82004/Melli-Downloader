name: Archive Website Offline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Website URL to archive"
        required: true
      output_dir:
        description: "Output directory"
        default: "archived"

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Download full website
        run: |
          python scripts/download_site.py \
            "${{ github.event.inputs.target_url }}" \
            "${{ github.event.inputs.output_dir }}"

      - name: Compress and split to 95MB chunks
        run: |
          cd ${{ github.event.inputs.output_dir }}
          tar -czf site.tar.gz .
          split -b 95m site.tar.gz site.tar.gz.part-

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Archive site: ${{ github.event.inputs.target_url }}"
          git push
