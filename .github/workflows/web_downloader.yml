name: Prerender and Mirror SPA Website

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'آدرس کامل سایت (مثال: https://www.typescriptlang.org)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prerender-spa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # نصب ابزارهای پیش‌رندر
      - name: Install Prerendering Tools
        run: |
          npm install -g prerender-spa-ultra react-snap

      # مرحله حیاتی: پیش‌رندر کردن کامل سایت
      - name: Prerender the Website
        id: prerender
        uses: antitoxic/prerender-spa-ultra@v1  # [citation:2][citation:3]
        with:
          website_root: './downloads'
          meta_prerender_only: '1'
          max_concurrent_pages: 5
          selector_to_wait_for: 'body'
        continue-on-error: true

      # استفاده از react-snap برای اطمینان بیشتر (اختیاری اما قدرتمند)
      - name: Enhance Prerendering with react-snap
        uses: brycedorn/react-snap-action@v1.0.2  # [citation:6]
        with:
          source: './downloads'

      - name: Create 95MB ZIP Archive
        run: |
          sudo apt-get update
          sudo apt-get install -y zip
          
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed 's|https\?://||' | sed 's|/.*$||')
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          ZIP_NAME="prerendered_${DOMAIN}_${TIMESTAMP}"
          
          zip -r -s 95m "${ZIP_NAME}.zip" ./downloads/
          
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      # آپلود فایل خروجی به ریپازیتوری
      - name: Commit and Push to Repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${ZIP_NAME}.zip* 2>/dev/null || true
          git commit -m "Prerendered mirror of ${{ github.event.inputs.site_url }}" 2>/dev/null || true
          git push origin main
          echo "✅ آپلود کامل شد! آرشیو نهایی: ${ZIP_NAME}.zip"
