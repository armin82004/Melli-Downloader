name: Download Site with HTTrack

on:
  workflow_dispatch:
    inputs:
      site_url:
        description: 'Website URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install HTTrack
        run: |
          sudo apt-get update
          sudo apt-get install -y httrack
      
      - name: Mirror website with HTTrack
        run: |
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          DOMAIN=$(echo "${{ github.event.inputs.site_url }}" | sed 's|https\?://||' | sed 's|/.*$||' | sed 's|\.|_|g')
          ZIP_NAME="backup_${DOMAIN}_${TIMESTAMP}"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          
          httrack "${{ github.event.inputs.site_url }}" \
            -O "./mirror" \
            --depth=10 \
            --mirror \
            --robots=0 \
            --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            --keep-links \
            --can-go-up-and-down \
            --extended \
            --timeout=30 \
            --retry=5 \
            --max-rate=500000 \
            --verbose || true
      
      - name: Compress and upload
        run: |
          sudo apt-get install -y zip
          
          if [ -d "./mirror" ]; then
            zip -r -s 95m "${ZIP_NAME}.zip" ./mirror/
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add ${ZIP_NAME}.zip* 2>/dev/null || true
            git commit -m "Add HTTrack mirror ${ZIP_NAME}" 2>/dev/null || true
            git push
          else
            echo "Mirror directory not found!"
          fi
